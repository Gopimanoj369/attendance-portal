<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Rainbow Animated Background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background: linear-gradient(
270deg,
#ff00cc,
#3333ff,
#00f2ff,
#00ff9d,
#f9ff00,
#ff7300,
#ff00cc
);

background-size:1400% 1400%;
animation:rainbowBG 15s ease infinite;
}

@keyframes rainbowBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}


/* Glass Container */

.container{
width:92%;
max-width:420px;

padding:30px;

border-radius:25px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,0.4);

box-shadow:
0 10px 40px rgba(0,0,0,0.3),
inset 0 0 20px rgba(255,255,255,0.2);

text-align:center;

color:white;

transition:0.4s;
}

.container:hover{
transform:translateY(-4px);
}


/* Heading */

h1{
font-size:23px;
margin-bottom:18px;

background:linear-gradient(90deg,#fff,#00f2ff,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}


/* AI Image */

.aiImage{
width:120px;
margin-bottom:15px;

filter:drop-shadow(0 0 15px #00e5ff);

animation:floatAI 4s ease-in-out infinite;
}

@keyframes floatAI{
0%{transform:translateY(0px)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0px)}
}


/* Input */

input{
width:100%;
padding:14px;

border-radius:14px;

border:2px solid rgba(255,255,255,0.5);

background:rgba(255,255,255,0.15);

color:white;

outline:none;

transition:0.3s;
}

input::placeholder{
color:#eee;
}

input:focus{
border:2px solid #00f2ff;
box-shadow:0 0 15px #00f2ff;
background:rgba(255,255,255,0.25);
}


/* Button */

button{
width:100%;
padding:12px;
margin-top:12px;

border:none;

border-radius:12px;

background:linear-gradient(135deg,#ff00cc,#00f2ff);

color:white;

font-size:15px;

cursor:pointer;

transition:0.3s;
}

button:hover{
transform:translateY(-3px) scale(1.02);

box-shadow:
0 8px 25px rgba(0,0,0,0.4),
0 0 15px #00f2ff;
}


/* Profile Card */

.profile{
margin-top:20px;

padding:18px;

border-radius:15px;

background:rgba(255,255,255,0.18);

border:1px solid rgba(255,255,255,0.5);

display:none;

backdrop-filter:blur(20px);
}


/* Avatar */

.avatar{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:10px;

border:3px solid rgba(255,255,255,0.6);
}


/* Attendance */

.attendance{
margin-top:10px;
font-size:14px;
}


/* Chart */

.chartBox{
margin-top:20px;
}


/* Message */

.message{
margin-top:15px;
font-weight:600;
}


/* Footer */

footer{
margin-top:20px;
font-size:12px;
opacity:0.85;
}

</style>

function checkAttendance(){

if(!students[roll]){
alert("Student Data Not Found");
return;
}

const s=students[roll];

const total=((s.jan+s.feb)/2).toFixed(1);

document.getElementById("profile").style.display="block";

document.getElementById("name").innerText=s.name;
document.getElementById("rollno").innerText="Roll: "+roll;

const janEl=document.getElementById("jan");
const febEl=document.getElementById("feb");
const totalEl=document.getElementById("total");

janEl.innerText="January: "+s.jan+"%";
febEl.innerText="February: "+s.feb+"%";
totalEl.innerText="Total: "+total+"%";

janEl.style.color = s.jan < 75 ? "#ff4d4d" : "#00ffae";
febEl.style.color = s.feb < 75 ? "#ff4d4d" : "#00ffae";
totalEl.style.color = total < 75 ? "#ff4d4d" : "#00ffae";

document.getElementById("avatar").src =
"https://ui-avatars.com/api/?name="+s.name+"&background=random";

/* Message */

const msg=document.getElementById("msg");

msg.innerText="Excellent Attendance mamula ledhu chappesav ⭐";
