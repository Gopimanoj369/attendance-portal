<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#dff4ff,#f5fbff,#e6f6ff);
}

/* Glass Card */

.container{
width:90%;
max-width:420px;
padding:30px;
border-radius:22px;

background:rgba(255,255,255,0.35);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.6);

box-shadow:
0 8px 32px rgba(31,135,255,0.15),
inset 0 0 0 rgba(255,255,255,0.4);

text-align:center;
}

h1{
font-size:22px;
margin-bottom:20px;
color:#1f3b57;
}

/* Roll Number Input */

input{
width:100%;
padding:13px;

border-radius:12px;

border:2px solid rgba(61,165,255,0.45);

background:rgba(255,255,255,0.7);

outline:none;

font-size:14px;

transition:all 0.25s ease;
}

/* Highlight when clicked */

input:focus{

border:2px solid #3da5ff;

box-shadow:0 0 8px rgba(61,165,255,0.4);

}

/* Button */

button{
width:100%;
padding:12px;
margin-top:12px;

border:none;

border-radius:12px;

background:linear-gradient(135deg,#4facff,#00c6ff);

color:white;

font-size:15px;

cursor:pointer;

transition:0.25s;
}

button:hover{

transform:translateY(-2px);

box-shadow:0 6px 18px rgba(0,140,255,0.25);

}

/* Student Card */

.profile{

margin-top:20px;

padding:18px;

border-radius:14px;

background:rgba(255,255,255,0.5);

border:1px solid rgba(255,255,255,0.7);

display:none;

}

/* Attendance Text */

.attendance{

margin-top:12px;

font-size:14px;

color:#2d3e50;

}

/* Graph */

.chartBox{

margin-top:20px;

}

/* Message */

.message{

margin-top:15px;

font-weight:600;

color:#2c3e50;

}

/* Footer */

footer{

margin-top:20px;

font-size:12px;

color:#4c6b88;

}

</style>
</head>

<div class="chartBox">

let chart;

function checkAttendance(){

const roll=document.getElementById("roll").value.trim();

if(!students[roll]){
alert("Student Data Not Found");
return;
}

const s=students[roll];

const total=((s.jan+s.feb)/2).toFixed(1);

document.getElementById("profile").style.display="block";

document.getElementById("name").innerText=s.name;
document.getElementById("rollno").innerText="Roll: "+roll;

document.getElementById("jan").innerText="January: "+s.jan+"%";
document.getElementById("feb").innerText="February: "+s.feb+"%";
document.getElementById("total").innerText="Total: "+total+"%";

const msg=document.getElementById("msg");

if(total>=75){
msg.innerText="75% above undhi elane maintain cheyyandi. Good luck 👍";
}else{
msg.innerText="75% maintain cheyi. Daily college ki randi. All the best ⚠️";
}

const colors=[
s.jan>=75?'#2ecc71':'#e74c3c',
s.feb>=75?'#2ecc71':'#e74c3c',
total>=75?'#2ecc71':'#e74c3c'
];

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['January','February','Total'],
datasets:[{
data:[s.jan,s.feb,total],
backgroundColor:colors
}]
},
options:{
animation:{duration:1500},
scales:{y:{beginAtZero:true,max:100}}
}
});

}
